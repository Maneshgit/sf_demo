# CD: Deploy SQL to production on merge to main
# Co-authored with CoCo
name: CD - Deploy SQL

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-sql:
    name: Deploy SQL to Snowflake
    runs-on: ubuntu-latest
    environment: prod

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: GITHUB_ACTIONS_SERVICE_USER
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-actions@v3
        with:
          use-oidc: true

      - name: Test connection
        run: snow connection test -x

      - name: Deploy SQL scripts
        run: |
          for file in deploy/*.sql; do
            echo "=== Deploying: $file ==="
            snow sql -f "$file" -x
          done
